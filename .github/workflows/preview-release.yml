name: preview-release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend tests
        working-directory: web
        run: npm test

      - name: Rebuild embedded frontend assets
        working-directory: web
        run: npm run build

      - name: Ensure embedded frontend assets are committed
        run: git diff --exit-code -- internal/web/dist

      - name: Run Go tests
        run: go test ./... -count=1

  build:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      preview_tag: ${{ steps.meta.outputs.preview_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build embedded frontend assets
        working-directory: web
        run: npm run build

      - name: Compute preview release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          branch_slug="$(echo "${GITHUB_REF_NAME}" | sed 's#[^A-Za-z0-9._-]#-#g')"
          short_sha="${GITHUB_SHA::7}"
          preview_tag="preview-${branch_slug}-r${GITHUB_RUN_NUMBER}-a${GITHUB_RUN_ATTEMPT}-${short_sha}"
          release_name="Preview ${branch_slug} r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT} (${short_sha})"

          echo "preview_tag=${preview_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build dist
          mkdir -p build dist

          targets=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
            "windows arm64 zip"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch archive_ext <<< "${target}"

            package_dir="build/authproxy_${goos}_${goarch}"
            binary_name="authproxy"
            if [[ "${goos}" == "windows" ]]; then
              binary_name="authproxy.exe"
            fi

            mkdir -p "${package_dir}"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w" \
              -o "${package_dir}/${binary_name}" ./cmd/authproxy

            cp README.md LICENSE "${package_dir}/"

            archive_name="authproxy_${goos}_${goarch}.${archive_ext}"
            if [[ "${archive_ext}" == "zip" ]]; then
              (
                cd build
                zip -rq "../dist/${archive_name}" "authproxy_${goos}_${goarch}"
              )
            else
              tar -C build -czf "dist/${archive_name}" "authproxy_${goos}_${goarch}"
            fi
          done

          (
            cd dist
            sha256sum ./* > SHA256SUMS.txt
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Publish preview release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_TAG: ${{ needs.build.outputs.preview_tag }}
          RELEASE_NAME: ${{ needs.build.outputs.release_name }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: |
          set -euo pipefail

          {
            echo "Automated preview release for branch ${GITHUB_REF_NAME} at commit ${SHORT_SHA}."
            echo
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- This release is marked as a prerelease."
            echo "- This release is explicitly excluded from Latest."
          } > release-notes.txt

          gh release create "${PREVIEW_TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_NAME}" \
            --notes-file release-notes.txt \
            --prerelease \
            --latest=false
